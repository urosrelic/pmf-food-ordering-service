openapi: 3.0.3
info:
  title: PMF Food Ordering Service API
  version: 1.0.0
  description: |
    OpenAPI specification for the PMF Food Ordering Service microservices platform.

    Services:
    - Auth Service
    - Category Service
    - Food Service
    - Restaurant Service
    - Cart Service

servers:
  - url: http://localhost:8222/api/v1
    description: Gateway
  - url: http://localhost:9898/api/v1
    description: Auth Service
  - url: http://localhost:8110/api/v1
    description: Category Service
  - url: http://localhost:8100/api/v1
    description: Food Service
  - url: http://localhost:8120/api/v1
    description: Restaurant Service
  - url: http://localhost:8130/api/v1
    description: Cart Service

tags:
  - name: Authentication
  - name: Category
  - name: Food
  - name: Restaurant
  - name: Cart

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
      responses:
        '201':
          description: User registered successfully
        '409':
          description: Email is already taken
        '400':
          description: Invalid request

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                  data:
                    type: string
                    description: JWT token
        '400':
          description: Wrong credentials

  /auth/validate:
    post:
      tags: [Authentication]
      summary: Validate JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token is valid
        '401':
          description: Token is invalid
        '400':
          description: Malformed JWT token

  /auth/get-user-data:
    get:
      tags: [Authentication]
      summary: Get authenticated user data
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
        '401':
          description: Unauthorized

  /auth/get-user:
    get:
      tags: [Authentication]
      summary: Get authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  /category/auth/add:
    post:
      tags: [Category]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreationRequest'
      responses:
        '201':
          description: Category created successfully
        '400':
          description: Error creating category

  /category:
    get:
      tags: [Category]
      summary: Get all categories
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '202':
          description: Empty categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /category/{id}:
    get:
      tags: [Category]
      summary: Get category by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Category not found

  /category/get-category-data/{id}:
    get:
      tags: [Category]
      summary: Get category data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: No category found with that ID

  /category/existsById/{id}:
    get:
      tags: [Category]
      summary: Check whether category exists
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Boolean existence result
          content:
            application/json:
              schema:
                type: boolean

  /category/getByIds:
    post:
      tags: [Category]
      summary: Get categories by ids
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCategoriesByIdsRequest'
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '202':
          description: Empty categories

  /food/auth/add:
    post:
      tags: [Food]
      summary: Create food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoodCreationRequest'
      responses:
        '200':
          description: Food created successfully
        '400':
          description: Invalid request

  /food:
    get:
      tags: [Food]
      summary: Get all food items
      responses:
        '200':
          description: Foods retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Food'
        '202':
          description: Foods are empty

  /food/{id}:
    get:
      tags: [Food]
      summary: Get food by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Food item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'
        '404':
          description: Food item not found

  /restaurant:
    post:
      tags: [Restaurant]
      summary: Create restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantCreationRequest'
      responses:
        '201':
          description: Restaurant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '400':
          description: Error adding restaurant
    get:
      tags: [Restaurant]
      summary: Get all restaurants
      responses:
        '200':
          description: Restaurants retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Restaurant'

  /restaurant/{id}:
    get:
      tags: [Restaurant]
      summary: Get restaurant by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restaurant found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '404':
          description: Restaurant not found

  /restaurant/existsById/{id}:
    get:
      tags: [Restaurant]
      summary: Check whether restaurant exists
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Boolean existence result
          content:
            application/json:
              schema:
                type: boolean

  /cart:
    post:
      tags: [Cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '200':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          description: Unauthorized
    get:
      tags: [Cart]
      summary: Get cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          description: Unauthorized
    patch:
      tags: [Cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '200':
          description: Item quantity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          description: Unauthorized

  /cart/remove-from-cart:
    delete:
      tags: [Cart]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveCartItemRequest'
      responses:
        '200':
          description: Item removed from cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegisterRequest:
      type: object
      required: [name, lastName, email, password]
      properties:
        name:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        password:
          type: string
          format: password

    UserLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    Role:
      type: string
      enum: [USER, ADMIN]

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        password:
          type: string
        orders:
          type: array
          items:
            type: string

    CategoryCreationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    GetCategoriesByIdsRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: string

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    FoodUnit:
      type: string
      enum: [MEAL, GRAM]

    FoodCreationRequest:
      type: object
      required: [name, unit, price, restaurant]
      properties:
        name:
          type: string
        unit:
          $ref: '#/components/schemas/FoodUnit'
        price:
          type: number
          format: double
        restaurant:
          type: string
        categories:
          type: array
          items:
            type: string

    Food:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        unit:
          $ref: '#/components/schemas/FoodUnit'
        price:
          type: number
          format: double
        restaurant:
          type: string
        categories:
          type: array
          items:
            type: string

    RestaurantCreationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        foods:
          type: array
          items:
            type: string
        openinTime:
          type: string
        closingTime:
          type: string

    Restaurant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        foods:
          type: array
          items:
            type: string
        openinTime:
          type: string
        closingTime:
          type: string

    AddToCartRequest:
      type: object
      required: [foodId, quantity]
      properties:
        foodId:
          type: string
        quantity:
          type: integer

    RemoveCartItemRequest:
      type: object
      required: [foodId]
      properties:
        foodId:
          type: string

    CartItem:
      type: object
      properties:
        food:
          type: string
        quantity:
          type: integer
        price:
          type: number
          format: double

    Cart:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        cartItems:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        cartTotal:
          type: number
          format: double
        confirmed:
          type: boolean

    FoodResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
          format: double
        restaurant:
          $ref: '#/components/schemas/RestaurantResponse'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    RestaurantResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double

    CartItemResponse:
      type: object
      properties:
        food:
          $ref: '#/components/schemas/FoodResponse'
        quantity:
          type: integer
        price:
          type: number
          format: double

    CartResponse:
      type: object
      properties:
        id:
          type: string
        cartItems:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
        cartTotal:
          type: number
          format: double
        confirmed:
          type: boolean